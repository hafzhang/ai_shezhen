# AI舌诊智能诊断系统 - Filebeat配置
#
# Filebeat configuration for shipping logs to Logstash.
#
# Author: Ralph Agent
# Date: 2026-02-12
#

filebeat.inputs:
  # Audit logs
  - type: log
    enabled: true
    paths:
      - /app/logs/audit/*.log
    fields:
      log_type: audit
    fields_under_root: true
    json.keys_under_root: true
    json.add_error_key: true
    multiline.pattern: '^{'
    multiline.negate: true
    multiline.match: after

  # Application logs
  - type: log
    enabled: true
    paths:
      - /app/logs/app/*.log
    fields:
      log_type: application
    fields_under_root: true

  # Error logs
  - type: log
    enabled: true
    paths:
      - /app/logs/error/*.log
    fields:
      log_type: error
    fields_under_root: true

# Output to Logstash
output.logstash:
  hosts: ["logstash:5044"]
  loadbalance: true
  ssl.enabled: false

# Logging
logging.level: info
logging.to_files: true
logging.files.path: /var/log/filebeat
logging.files.name: filebeat
logging.files.rotateeverybytes: 10485760
logging.files.keepfiles: 7

# Processors
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~
  - add_kubernetes_metadata: ~
