# Alembic Configuration for AI舌诊智能诊断系统
# Generated by Ralph Agent - US-101

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = Asia/Shanghai

# Truncate slugs to 40 characters
truncate_slug_length = 40

# Revision numbering scheme
# Options: integer, hex, or custom
revision_environment = false

# Source directories to scan for models
# prepend_sys_path is . (current directory)
prepend_sys_path = .

# Version path separator (default: os.pathsep)
version_path_separator = os

# Output encoding
output_encoding = utf-8

[post_write_hooks]
# Hooks to run after generating a new migration script
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
