# 数据增强配置文件
# AI舌诊智能诊断系统
# 用于分割和分类任务的数据增强策略

# ============================================================
# 全局配置
# ============================================================
global:
  image_size: [512, 512]  # 目标图像尺寸 (H, W)
  probability: 0.8         # 增强应用概率
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# ============================================================
# 分割任务增强配置
# ============================================================
segmentation:
  task_type: "segmentation"
  description: "用于舌体分割任务的数据增强策略"

  # 增强强度预设
  strength_presets:
    light:
      horizontal_flip_prob: 0.5
      vertical_flip_prob: 0.0
      rotate_prob: 0.3
      rotate_limit: 15
      scale_prob: 0.3
      scale_limit: 0.1
      brightness_prob: 0.3
      brightness_limit: 0.1
      contrast_prob: 0.3
      contrast_limit: 0.1
      blur_prob: 0.1
      noise_prob: 0.1

    medium:
      horizontal_flip_prob: 0.5
      vertical_flip_prob: 0.1
      rotate_prob: 0.5
      rotate_limit: 30
      scale_prob: 0.4
      scale_limit: 0.2
      brightness_prob: 0.4
      brightness_limit: 0.2
      contrast_prob: 0.4
      contrast_limit: 0.2
      blur_prob: 0.2
      noise_prob: 0.2
      elastic_prob: 0.2
      elastic_alpha: 50
      grid_distortion_prob: 0.1

    heavy:
      horizontal_flip_prob: 0.5
      vertical_flip_prob: 0.2
      rotate_prob: 0.7
      rotate_limit: 45
      scale_prob: 0.5
      scale_limit: 0.3
      brightness_prob: 0.5
      brightness_limit: 0.3
      contrast_prob: 0.5
      contrast_limit: 0.3
      blur_prob: 0.3
      noise_prob: 0.3
      elastic_prob: 0.4
      elastic_alpha: 100
      grid_distortion_prob: 0.3
      optical_distortion_prob: 0.2
      shift_scale_rotate_prob: 0.5

  # 当前使用的强度
  active_strength: "medium"

  # 几何变换
  geometric:
    - name: "HorizontalFlip"
      enabled: true
      probability: 0.5
    - name: "VerticalFlip"
      enabled: true
      probability: 0.1
    - name: "Rotate"
      enabled: true
      limit: 30
      border_mode: "constant"
    - name: "RandomScale"
      enabled: true
      scale_limit: 0.2
    - name: "ElasticTransform"
      enabled: true
      alpha: 50
      sigma: 6
    - name: "GridDistortion"
      enabled: true
      num_steps: 5
      distort_limit: 0.1
    - name: "RandomResizedCrop"
      enabled: true
      scale: [0.8, 1.0]
      ratio: [0.9, 1.1]

  # 颜色变换
  color:
    - name: "RandomBrightnessContrast"
      enabled: true
      brightness_limit: 0.2
      contrast_limit: 0.2
    - name: "HueSaturationValue"
      enabled: true
      hue_shift_limit: 20
      sat_shift_limit: 30
      val_shift_limit: 20

  # 噪声和模糊
  noise:
    - name: "GaussianBlur"
      enabled: true
      blur_limit: [3, 7]
      probability: 0.2
    - name: "MotionBlur"
      enabled: true
      blur_limit: [3, 7]
      probability: 0.2
    - name: "GaussNoise"
      enabled: true
      var_limit: [10, 50]
      probability: 0.2

# ============================================================
# 分类任务增强配置
# ============================================================
classification:
  task_type: "classification"
  description: "用于舌象分类任务的数据增强策略"

  # 增强强度预设
  strength_presets:
    light:
      horizontal_flip_prob: 0.5
      rotate_prob: 0.3
      rotate_limit: 15
      color_jitter_prob: 0.3
      color_jitter_strength: 0.1
      cutmix_prob: 0.0
      cutmix_beta: 1.0
      mixup_prob: 0.0
      mixup_alpha: 0.2

    medium:
      horizontal_flip_prob: 0.5
      rotate_prob: 0.5
      rotate_limit: 30
      color_jitter_prob: 0.5
      color_jitter_strength: 0.2
      cutmix_prob: 0.2
      cutmix_beta: 1.0
      mixup_prob: 0.1
      mixup_alpha: 0.2

    heavy:
      horizontal_flip_prob: 0.5
      rotate_prob: 0.7
      rotate_limit: 45
      color_jitter_prob: 0.7
      color_jitter_strength: 0.3
      cutmix_prob: 0.3
      cutmix_beta: 1.0
      mixup_prob: 0.2
      mixup_alpha: 0.2
      randaugment_num: 2
      randaugment_magnitude: 9

  # 当前使用的强度
  active_strength: "medium"

  # 几何变换
  geometric:
    - name: "HorizontalFlip"
      enabled: true
      probability: 0.5
    - name: "VerticalFlip"
      enabled: true
      probability: 0.1
    - name: "Rotate"
      enabled: true
      limit: 30
    - name: "RandomResizedCrop"
      enabled: true
      scale: [0.8, 1.0]
      ratio: [0.9, 1.1]

  # 颜色变换
  color:
    - name: "ColorJitter"
      enabled: true
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1
      probability: 0.5
    - name: "HueSaturationValue"
      enabled: true
      hue_shift_limit: 20
      sat_shift_limit: 30
      val_shift_limit: 20
    - name: "RGBShift"
      enabled: true
      r_shift_limit: 20
      g_shift_limit: 20
      b_shift_limit: 20

  # 高级增强
  advanced:
    - name: "RandAugment"
      enabled: false  # 仅在heavy强度启用
      num_ops: 2
      magnitude: 9
    - name: "AutoAugment"
      enabled: false  # 需要imagenet权重
      policy: "imagenet"

  # CutMix配置
  cutmix:
    enabled: true
    probability: 0.2
    beta: 1.0
    description: "混合两张图像的矩形区域，适合多标签分类"

  # MixUp配置
  mixup:
    enabled: true
    probability: 0.1
    alpha: 0.2
    description: "线性插值两张图像和标签"

  # Coarse Dropout（遮挡模拟）
  coarse_dropout:
    enabled: true
    max_holes: 8
    max_height: 32
    max_width: 32
    min_holes: 1
    min_height: 8
    min_width: 8
    probability: 0.2

# ============================================================
# 少数类专项增强配置
# ============================================================
minority_class_enhancement:
  enabled: true
  description: "针对样本数<100的类别实施更强增强"

  # 少数类列表（基于数据集分析）
  minority_classes:
    # 舌色
    - id: 3
      name: "绛紫舌"
      category: "tongue_color"
    - id: 11
      name: "黑苔舌"
      category: "coating_color"
    - id: 12
      name: "花剥苔舌"
      category: "coating_color"
    # 舌形
    - id: 5
      name: "瘦薄舌"
      category: "tongue_shape"
    # 特征
    - id: 7
      name: "裂纹舌"
      category: "features"

  # 增强倍数
  augment_multiplier: 5

  # 更强的增强参数
  intense_augmentation:
    horizontal_flip_prob: 0.5
    vertical_flip_prob: 0.3
    rotate_limit: 45
    rotate_prob: 0.8

    # 弹性变换（舌形变化）
    elastic_transform:
      enabled: true
      alpha: 100
      sigma: 6
      probability: 0.5

    # 网格畸变
    grid_distortion:
      enabled: true
      num_steps: 5
      distort_limit: 0.2
      probability: 0.4

    # 透视变换
    perspective:
      enabled: true
      scale: 0.05
      probability: 0.3

    # 颜色抖动
    color_jitter:
      brightness: 0.3
      contrast: 0.3
      saturation: 0.3
      hue: 0.1
      probability: 0.7

    # 噪声和模糊
    noise:
      gaussian_blur:
        blur_limit: [3, 9]
        probability: 0.4
      gauss_noise:
        var_limit: [10, 80]
        probability: 0.4

    # 遮挡增强
    coarse_dropout:
      max_holes: 12
      max_height: 32
      max_width: 32
      probability: 0.3

# ============================================================
# Lab颜色空间增强配置
# ============================================================
lab_color_space:
  enabled: true
  description: "Lab颜色空间增强，更符合人眼感知，适合舌诊图像"

  # Lab通道调整范围
  channels:
    L:
      name: "亮度"
      shift_range: [-20, 20]
      description: "调整整体亮度"
    a:
      name: "红绿平衡"
      shift_range: [-15, 15]
      description: "调整红绿偏色"
    b:
      name: "黄蓝平衡"
      shift_range: [-15, 15]
      description: "调整黄蓝偏色"

  # 舌诊专用颜色范围
  tongue_color_ranges:
    healthy:
      h_min: 0
      h_max: 30
      s_min: 20
      s_max: 80
      v_min: 180
      v_max: 255
      description: "淡红/淡白（健康舌）"
    red:
      h_min: 0
      h_max: 20
      s_min: 50
      s_max: 150
      v_min: 100
      v_max: 255
      description: "红舌"
    purple:
      h_min: 240
      h_max: 280
      s_min: 30
      s_max: 100
      v_min: 80
      v_max: 200
      description: "绛紫舌"
    pale:
      h_min: 0
      h_max: 30
      s_min: 0
      s_max: 30
      v_min: 180
      v_max: 255
      description: "淡白舌"

  coating_color_ranges:
    white:
      h_min: 0
      h_max: 180
      s_min: 0
      s_max: 30
      v_min: 180
      v_max: 255
      description: "白苔"
    yellow:
      h_min: 30
      h_max: 60
      s_min: 30
      s_max: 120
      v_min: 150
      v_max: 255
      description: "黄苔"
    black:
      h_min: 0
      h_max: 180
      s_min: 0
      s_max: 30
      v_min: 20
      v_max: 100
      description: "黑苔"

# ============================================================
# 使用说明
# ============================================================
usage:
  # 分割任务训练
  segmentation_train:
    pipeline: "SegmentationAugmentationPipeline"
    config:
      strength: "medium"
      image_size: [512, 512]
      use_lab_color: true
      minority_class_enhanced: false

  # 分类任务训练
  classification_train:
    pipeline: "ClassificationAugmentationPipeline"
    config:
      strength: "medium"
      image_size: [512, 512]
      cutmix:
        enabled: true
        probability: 0.2
      mixup:
        enabled: true
        probability: 0.1

  # 少数类专项增强
  minority_class_train:
    pipeline: "MinorityClassAugmentation"
    config:
      base_pipeline: "segmentation"  # or "classification"
      augment_multiplier: 5

  # 验证集（不使用增强）
  validation:
    pipeline: "basic"
    config:
      resize: [512, 512]
      normalize: true

# ============================================================
# 命令行示例
# ============================================================
command_examples:
  # 生成分割增强可视化
  - "python datasets/tools/augmentation.py --task segmentation --visualize --num_samples 10"

  # 生成分类增强可视化
  - "python datasets/tools/augmentation.py --task classification --visualize --num_samples 10"

  # 生成增强配置文件
  - "python datasets/tools/augmentation.py --generate-config"

  # 少数类专项增强
  - "python datasets/tools/augmentation.py --minority-only --augment-count 10"

  # 使用高强度增强
  - "python datasets/tools/augmentation.py --task both --strength heavy --visualize"
