# Grafana数据源配置 - Prometheus
#
# Grafana datasource provisioning for Prometheus.
# This configuration is automatically loaded on Grafana startup.
#
# Author: Ralph Agent
# Date: 2026-02-12

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"
    version: 1
