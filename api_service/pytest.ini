[pytest]
# Pytest configuration for AI舌诊智能诊断系统
# Phase 4: Testing & Documentation - US-171

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum pytest version required
minversion = 7.0

# Add current directory to Python path for imports
pythonpath = .

# Asyncio mode for async tests
asyncio_mode = auto

# Coverage configuration (when using pytest-cov)
addopts =
    # Strict markers - all markers must be registered
    --strict-markers
    # Show extra test summary info
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Verbose output
    -v
    # Show warnings
    -W default

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use database/network)
    slow: Slow tests (may take > 1 second)
    database: Tests that require database access
    auth: Tests related to authentication/authorization
    model: Tests for database models
    api: Tests for API endpoints

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings filter
filterwarnings =
    # Ignore SQLAlchemy warnings about SAWarning
    ignore::sqlalchemy.exc.SAWarning
    # Ignore deprecation warnings from dependencies
    ignore::DeprecationWarning
