# AI舌诊智能诊断系统 - Logstash配置
#
# Logstash pipeline configuration for collecting logs from API service.
# Collects logs from Filebeat and outputs to Elasticsearch.
#
# Author: Ralph Agent
# Date: 2026-02-12
#

input {
  # Receive logs from Filebeat
  beats {
    port => 5044
    tags => ["beats"]
  }
}

filter {
  # Parse JSON formatted logs
  if [fileset][name] == "audit" {
    json {
      source => "message"
      target => "audit_log"
      skip_on_invalid_json => true
    }

    # Parse audit log fields
    mutate {
      add_field => {
        "log_type" => "audit"
        "environment" => "${ELK_ENVIRONMENT:production}"
      }
    }

    # Extract diagnosis-specific fields
    if [audit_log][message] =~ /^DIAGNOSIS/ {
      grok {
        match => {
          "audit_log[message]" => "DIAGNOSIS image_id=%{DATA:image_id} type=%{WORD:diagnosis_type} success=%{WORD:success}(?: model_latency_ms=%{NUMBER:model_latency_ms})?(?: llm_latency_ms=%{NUMBER:llm_latency_ms})?"
        }
      }
      mutate {
        add_tag => ["diagnosis"]
      }
    }

    # Extract API request fields
    if [audit_log][message] =~ /^API_REQUEST/ {
      grok {
        match => {
          "audit_log[message]" => "API_REQUEST method=%{WORD:method} path=%{DATA:path} client_ip=%{IP:client_ip}(?: user_agent=%{DATA:user_agent})?"
        }
      }
      mutate {
        add_tag => ["api_request"]
      }
    }

    # Extract API response fields
    if [audit_log][message] =~ /^API_RESPONSE/ {
      grok {
        match => {
          "audit_log[message]" => "API_RESPONSE method=%{WORD:method} path=%{DATA:path} status=%{NUMBER:status_code} duration_ms=%{NUMBER:duration_ms}"
        }
      }
      mutate {
        add_tag => ["api_response"]
      }
    }

    # Extract error fields
    if [audit_log][message] =~ /^ERROR/ {
      grok {
        match => {
          "audit_log[message]" => "ERROR type=%{DATA:error_type} message=%{GREEDYDATA:error_message}"
        }
      }
      mutate {
        add_tag => ["error"]
      }
    }
  }

  # Parse application logs
  if [fileset][name] == "application" {
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:log_timestamp}\] %{LOGLEVEL:log_level}%{SPACE}\[%{DATA:logger}:%{DATA:function}:%{NUMBER:line}\] %{GREEDYDATA:log_message}"
      }
      pattern_definitions => {
        "TIMESTAMP_ISO8601" => "%{YEAR}-%{MONTHNUM}-%{MONTHDAY} %{HOUR}:%{MINUTE}:%{SECOND}"
      }
    }

    mutate {
      add_field => {
        "log_type" => "application"
        "environment" => "${ELK_ENVIRONMENT:production}"
      }
    }
  }

  # Add geolocation based on client IP
  if [client_ip] {
    geoip {
      source => "[client_ip]"
      target => "geoip"
      add_tag => ["geoip"]
    }
  }

  # Add timestamp
  date {
    match => ["log_timestamp", "timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Remove unnecessary fields
  mutate {
    remove_field => ["agent", "ecs", "host", "log", "message"]
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
    index => "shezhen-%{log_type}-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"
    ssl => "${ELASTICSEARCH_SSL:true}"
    ssl_certificate_verification => ${ELASTICSEARCH_VERIFY_SSL:true}
  }

  # Debug output (disable in production)
  if [log_level] == "DEBUG" {
    stdout {
      codec => rubydebug
    }
  }
}
