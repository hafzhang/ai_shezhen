# Grafana仪表板配置 - 自动加载
#
# Grafana dashboard provisioning configuration.
# Automatically loads dashboards from the configured directory.
#
# Author: Ralph Agent
# Date: 2026-02-12

apiVersion: 1

providers:
  - name: 'Shezhen'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
