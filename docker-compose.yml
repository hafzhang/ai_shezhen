# AI舌诊智能诊断系统 - Docker Compose配置
#
# Docker Compose configuration for Tongue Diagnosis AI System
# Includes API service, Celery worker, Redis, and monitoring services.
#
# Author: Ralph Agent
# Date: 2026-02-12
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d --build      # Rebuild and start
#   docker compose logs -f api        # Follow API logs
#   docker compose down                # Stop and remove containers

services:
  # ============================================================================
  # Redis - Message Broker & Result Backend
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: shezhen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - shezhen-network

  # ============================================================================
  # API Service (FastAPI)
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: api_service/Dockerfile
    container_name: shezhen-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./api_service:/app/api_service
      - ./logs:/app/logs
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - LOG_LEVEL=INFO
    env_file:
      - api_service/.env
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - shezhen-network

  # ============================================================================
  # Celery Worker - Main Queue
  # ============================================================================
  celery-worker:
    build:
      context: .
      dockerfile: api_service/Dockerfile
    container_name: shezhen-celery-worker
    restart: unless-stopped
    command: celery -A api_service.worker.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./models:/app/models:ro
      - ./api_service:/app/api_service
      - ./logs:/app/logs
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - LOG_LEVEL=INFO
      - INFERENCE_DEVICE=cpu
    env_file:
      - api_service/.env
    depends_on:
      - redis
    networks:
      - shezhen-network

  # ============================================================================
  # Celery Beat - Periodic Task Scheduler
  # ============================================================================
  celery-beat:
    build:
      context: .
      dockerfile: api_service/Dockerfile
    container_name: shezhen-celery-beat
    restart: unless-stopped
    command: celery -A api_service.worker.celery_app beat --loglevel=info
    volumes:
      - ./api_service:/app/api_service
      - ./logs:/app/logs
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - LOG_LEVEL=INFO
    env_file:
      - api_service/.env
    depends_on:
      - redis
    networks:
      - shezhen-network

  # ============================================================================
  # Flower - Celery Monitoring (Optional)
  # ============================================================================
  flower:
    build:
      context: .
      dockerfile: api_service/Dockerfile
    container_name: shezhen-flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    command: celery -A api_service.worker.celery_app flower --port=5555 --broker=redis://redis:6379/1
    volumes:
      - ./api_service:/app/api_service
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - redis
      - celery-worker
    networks:
      - shezhen-network
    profiles:
      - monitoring  # Only start with --profile monitoring

  # ============================================================================
  # MLflow - Model Tracking (Optional)
  # ============================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.0
    container_name: shezhen-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    command: mlflow server --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts
    networks:
      - shezhen-network
    profiles:
      - monitoring

  # ============================================================================
  # Prometheus - Metrics Collection (task-5-2)
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: shezhen-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - shezhen-network
    profiles:
      - monitoring

  # ============================================================================
  # Grafana - Visualization (task-5-2)
  # ============================================================================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: shezhen-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards/shezhen:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_PROVISIONING_ENABLED=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    depends_on:
      - prometheus
    networks:
      - shezhen-network
    profiles:
      - monitoring

  # ============================================================================
  # Redis Exporter - Redis Metrics (task-5-2)
  # ============================================================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: shezhen-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    command:
      - '--redis.addr=redis:6379'
    depends_on:
      - redis
    networks:
      - shezhen-network
    profiles:
      - monitoring

  # ============================================================================
  # Node Exporter - System Metrics (task-5-2)
  # ============================================================================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: shezhen-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - shezhen-network
    profiles:
      - monitoring

  # ============================================================================
  # cAdvisor - Container Metrics (task-5-2)
  # ============================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: shezhen-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - shezhen-network
    profiles:
      - monitoring

  # ============================================================================
  # Elasticsearch - Log Storage (task-5-3)
  # ============================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: shezhen-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elk/elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "curl -u elastic:${ELASTICSEARCH_PASSWORD:-changeme} -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - shezhen-network
    profiles:
      - logging

  # ============================================================================
  # Logstash - Log Pipeline (task-5-3)
  # ============================================================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: shezhen-logstash
    restart: unless-stopped
    volumes:
      - ./elk/logstash/config/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    command: logstash -f /usr/share/logstash/pipeline/logstash.conf
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-elastic}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
      - ELK_ENVIRONMENT=${ELK_ENVIRONMENT:-production}
    depends_on:
      - elasticsearch
    networks:
      - shezhen-network
    profiles:
      - logging

  # ============================================================================
  # Kibana - Log Visualization (task-5-3)
  # ============================================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: shezhen-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    volumes:
      - ./elk/kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - kibana_data:/usr/share/kibana/data
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-elastic}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
      - KIBANA_ENCRYPTION_KEY=${KIBANA_ENCRYPTION_KEY:-shezhen-encryption-key-32-chars-long!!}
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - shezhen-network
    profiles:
      - logging

  # ============================================================================
  # Filebeat - Log Shipper (task-5-3)
  # ============================================================================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: shezhen-filebeat
    restart: unless-stopped
    user: root
    volumes:
      - ./elk/filebeat/config/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/app/logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    command: filebeat -e -strict.perms=false
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-elastic}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
    depends_on:
      - logstash
    networks:
      - shezhen-network
    profiles:
      - logging

  # ============================================================================
  # ELK Setup - Index Configuration (task-5-3)
  # ============================================================================
  elk-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: shezhen-elk-setup
    volumes:
      - ./elk/setup/audit_indices.sh:/setup/audit_indices.sh:ro
    command: /bin/bash /setup/audit_indices.sh
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USER=${ELASTICSEARCH_USER:-elastic}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
      - KIBANA_HOST=http://kibana:5601
    depends_on:
      - elasticsearch
      - kibana
    networks:
      - shezhen-network
    profiles:
      - logging

# ============================================================================
# Volumes
# ============================================================================
volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
  kibana_data:
    driver: local
  filebeat_data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  shezhen-network:
    driver: bridge
